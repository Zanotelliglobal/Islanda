<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Islanda">
<meta name="theme-color" content="#0a1929">
<title>🇮🇸 Islanda · App</title>
<style>
:root {
  --bg: #f5f5f7;
  --bg-elevated: #ffffff;
  --bg-nav: rgba(255,255,255,0.85);
  --text: #0a1929;
  --text-secondary: #3c3c43;
  --text-muted: #8e8e93;
  --brand: #1e3a5f;
  --brand-light: #2c5282;
  --gold: #d4a574;
  --accent: #007aff;
  --danger: #ff3b30;
  --warn: #ff9500;
  --success: #34c759;
  --border: rgba(60,60,67,0.12);
  --separator: rgba(60,60,67,0.08);
  --tab-h: 64px;
  --header-h: 52px;
  --shadow-card: 0 1px 3px rgba(10,25,41,0.06);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --bg-elevated: #1c1c1e;
    --bg-nav: rgba(28,28,30,0.85);
    --text: #ffffff;
    --text-secondary: #ebebf5;
    --text-muted: #98989f;
    --brand: #7ba3d0;
    --brand-light: #5b8bb8;
    --gold: #e6b781;
    --accent: #0a84ff;
    --danger: #ff453a;
    --warn: #ff9f0a;
    --success: #30d158;
    --border: rgba(84,84,88,0.32);
    --separator: rgba(84,84,88,0.24);
    --shadow-card: 0 1px 3px rgba(0,0,0,0.4);
  }
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 15px;
  line-height: 1.4;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4 { color: var(--text); font-weight: 700; line-height: 1.2; letter-spacing: -0.3px; }
h1 { font-size: 34px; letter-spacing: -1.2px; }
h2 { font-size: 22px; margin: 0 0 8px 0; letter-spacing: -0.5px; }
h3 { font-size: 17px; margin: 0 0 6px 0; }
h4 { font-size: 15px; margin: 0 0 4px 0; }
p { margin: 0 0 8px 0; color: var(--text-secondary); }
a { color: var(--accent); text-decoration: none; }
strong { font-weight: 600; color: var(--text); }
ul, ol { padding-left: 20px; margin: 6px 0; }
li { margin-bottom: 3px; color: var(--text-secondary); }

/* ============= APP SHELL ============= */
.app-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: calc(var(--header-h) + env(safe-area-inset-top));
  padding-top: env(safe-area-inset-top);
  background: var(--bg-nav);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.3px;
}
.header-back {
  position: absolute;
  left: 8px;
  top: env(safe-area-inset-top);
  height: var(--header-h);
  padding: 0 12px;
  display: none;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--accent);
  font-size: 17px;
  font-weight: 400;
  cursor: pointer;
  font-family: inherit;
}
.header-back::before { content: "‹"; font-size: 28px; font-weight: 400; margin-top: -3px; }
.header-back.visible { display: flex; }

.app-content {
  position: fixed;
  top: calc(var(--header-h) + env(safe-area-inset-top));
  bottom: calc(var(--tab-h) + env(safe-area-inset-bottom));
  left: 0; right: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 20px;
}

/* ============= TAB BAR ============= */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
  background: var(--bg-nav);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid var(--border);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  z-index: 100;
}
.tab-btn {
  border: none;
  background: none;
  color: var(--text-muted);
  font-family: inherit;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 6px 4px;
  font-size: 10px;
  font-weight: 500;
  transition: color 0.15s;
}
.tab-btn .tab-icon { font-size: 22px; line-height: 1; }
.tab-btn.active { color: var(--accent); font-weight: 600; }
.tab-btn:active { transform: scale(0.94); }
.tab-btn.sos { color: var(--danger); }
.tab-btn.sos.active { color: var(--danger); }
.tab-btn.sos.active .tab-icon { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

/* ============= TAB PANELS ============= */
.tab-panel { display: none; padding: 12px 16px 24px 16px; }
.tab-panel.active { display: block; }
.tab-panel.no-padding { padding: 0; }

/* ============= LIST GROUP (iOS-style) ============= */
.list-group {
  background: var(--bg-elevated);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: var(--shadow-card);
}
.list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  min-height: 48px;
  border-bottom: 0.5px solid var(--separator);
  color: var(--text);
  cursor: pointer;
  background: var(--bg-elevated);
  border: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
  font-size: 15px;
}
.list-item:last-child { border-bottom: none; }
.list-item:active { background: var(--separator); }
.list-item .icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
.list-item .label { flex: 1; font-weight: 500; }
.list-item .value { color: var(--text-muted); font-size: 14px; }
.list-item .chevron { color: var(--text-muted); font-size: 20px; margin-left: 4px; opacity: 0.5; }
.list-item .chevron::after { content: "›"; }
.list-header {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 20px 16px 8px 16px;
}

/* ============= CARDS ============= */
.card {
  background: var(--bg-elevated);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
}
.card-hero {
  background: linear-gradient(140deg, #0a1929, #1e3a5f 60%, #2c5282);
  color: white;
  border-radius: 18px;
  padding: 22px 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.card-hero::before {
  content: "";
  position: absolute;
  top: -50px; right: -50px;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(212,165,116,0.15);
}
.card-hero > * { position: relative; }
.card-hero-flag { font-size: 36px; margin-bottom: 6px; }
.card-hero h1 { color: white; font-size: 32px; letter-spacing: -1px; margin: 0 0 4px 0; }
.card-hero-subtitle { color: rgba(255,255,255,0.85); font-size: 14px; }
.card-hero-grid {
  margin-top: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.card-hero-stat {
  background: rgba(255,255,255,0.1);
  padding: 10px 12px;
  border-radius: 10px;
  backdrop-filter: blur(10px);
}
.card-hero-stat-label { color: var(--gold); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.card-hero-stat-value { color: white; font-size: 16px; font-weight: 700; margin-top: 2px; }

/* Today badge */
.today-pill {
  display: inline-block;
  background: var(--success);
  color: white;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Section title inside tab */
.section-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
  padding: 4px 4px 12px 4px;
  margin-top: 4px;
}
.section-title.large { font-size: 28px; letter-spacing: -0.8px; }
.section-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  padding: 0 4px 12px 4px;
}

/* ============= BUTTONS ============= */
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-family: inherit;
  color: var(--accent);
  background: rgba(0,122,255,0.12);
  text-decoration: none;
  min-height: 40px;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--accent); color: white; }
.btn-success { background: rgba(52,199,89,0.15); color: var(--success); }
.btn-success.solid { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-map { background: rgba(0,122,255,0.12); color: var(--accent); }
.btn-large { min-height: 52px; font-size: 16px; padding: 14px 20px; }
.btn-block { width: 100%; }

/* SOS big buttons */
.sos-btn-huge {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 24px;
  border-radius: 18px;
  background: var(--danger);
  color: white;
  font-size: 22px;
  font-weight: 700;
  border: none;
  width: 100%;
  cursor: pointer;
  font-family: inherit;
  margin-bottom: 12px;
  box-shadow: 0 6px 20px rgba(255,59,48,0.35);
  letter-spacing: -0.3px;
}
.sos-btn-huge:active { transform: scale(0.97); }

/* Timeline (day details) */
.timeline { padding: 0; margin: 8px 0; list-style: none; }
.timeline li {
  display: grid;
  grid-template-columns: 54px 1fr;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 0.5px solid var(--separator);
  align-items: start;
  color: var(--text-secondary);
  font-size: 14px;
  line-height: 1.5;
}
.timeline li:last-child { border-bottom: none; }
.timeline-time { font-weight: 700; color: var(--brand); font-variant-numeric: tabular-nums; }
@media (prefers-color-scheme: dark) {
  .timeline-time { color: var(--brand); }
}

/* Inline map link */
a.mp {
  color: var(--accent);
  font-weight: 500;
  border-bottom: 0.5px dashed var(--accent);
}
a.mp::after { content: " ›"; opacity: 0.6; }

/* ============= HOTEL CARDS ============= */
.hotel-card {
  background: var(--bg-elevated);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
  border-left: 4px solid var(--gold);
}
.hotel-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}
.hotel-card-num {
  background: var(--gold);
  color: white;
  width: 26px; height: 26px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}
.hotel-card-title { flex: 1; }
.hotel-card-name { font-weight: 700; font-size: 16px; line-height: 1.25; margin-bottom: 2px; }
.hotel-card-dates { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.hotel-card-rating {
  background: var(--gold);
  color: white;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.hotel-card-meta {
  font-size: 13px;
  color: var(--text-secondary);
  margin: 8px 0 12px 0;
  line-height: 1.45;
}
.hotel-card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.hotel-card-actions .btn { flex: 1; min-width: 100px; padding: 10px 12px; font-size: 13px; }

/* ============= DAY CARD (in Giorni tab) ============= */
.day-card {
  background: var(--bg-elevated);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 10px;
  box-shadow: var(--shadow-card);
}
.day-card-summary {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  border: none;
  width: 100%;
  background: none;
  text-align: left;
  font-family: inherit;
  color: var(--text);
}
.day-card-summary:active { background: var(--separator); }
.day-num-badge {
  background: linear-gradient(135deg, #0a1929, #1e3a5f);
  color: var(--gold);
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 800;
  flex-shrink: 0;
}
.day-info { flex: 1; min-width: 0; }
.day-info-title { font-size: 15px; font-weight: 700; line-height: 1.2; margin-bottom: 3px; }
.day-info-meta { font-size: 12px; color: var(--text-muted); }
.day-chevron { color: var(--text-muted); font-size: 24px; margin-left: 4px; opacity: 0.4; transition: transform 0.2s; }
.day-card.open .day-chevron { transform: rotate(90deg); }
.day-card-body { display: none; padding: 4px 16px 16px 16px; border-top: 0.5px solid var(--separator); }
.day-card.open .day-card-body { display: block; }
.day-card.today {
  border: 2px solid var(--success);
}
.day-card.today .day-num-badge {
  background: linear-gradient(135deg, var(--success), #2ea44f);
  color: white;
}

/* Progress calendar strip */
.calendar-strip {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 4px;
  margin-bottom: 16px;
  padding: 4px;
}
.cal-day {
  aspect-ratio: 1;
  border-radius: 8px;
  background: var(--bg-elevated);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  border: 1px solid var(--separator);
  padding: 2px;
}
.cal-day .cal-num { font-size: 15px; font-weight: 800; color: var(--text); }
.cal-day.past { opacity: 0.35; }
.cal-day.today { background: var(--success); border-color: var(--success); }
.cal-day.today .cal-num { color: white; }
.cal-day.today { color: rgba(255,255,255,0.9); }
.cal-day:active { transform: scale(0.9); }

/* Alert boxes */
.box {
  border-radius: 12px;
  padding: 12px 14px;
  margin: 10px 0;
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--text-secondary);
  border-left: 4px solid var(--brand);
  background: rgba(30,58,95,0.06);
}
.box.warn { border-left-color: var(--warn); background: rgba(255,149,0,0.1); }
.box.danger { border-left-color: var(--danger); background: rgba(255,59,48,0.1); }
.box.success { border-left-color: var(--success); background: rgba(52,199,89,0.1); }
.box.gold { border-left-color: var(--gold); background: rgba(212,165,116,0.12); }
.box-title { font-weight: 700; margin-bottom: 3px; font-size: 13.5px; color: var(--text); }

/* Table */
.table-wrap { overflow-x: auto; margin: 6px -4px; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 8px 10px; text-align: left; border-bottom: 0.5px solid var(--separator); vertical-align: top; }
th { background: var(--brand); color: white; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; }
tr td strong { color: var(--text); }

/* Checklists */
.checklist { list-style: none; padding: 0; margin: 4px 0; }
.checklist li {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 4px;
  border-bottom: 0.5px solid var(--separator);
  cursor: pointer;
  font-size: 14px;
  user-select: none;
  -webkit-user-select: none;
  color: var(--text-secondary);
}
.checklist li input[type="checkbox"] {
  width: 24px; height: 24px;
  accent-color: var(--accent);
  flex-shrink: 0;
  margin: 0;
  cursor: pointer;
}
.checklist li.done { color: var(--text-muted); text-decoration: line-through; opacity: 0.5; }
.checklist li:last-child { border-bottom: none; }

/* Phone row (contacts) */
.phone-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--separator);
  background: var(--bg-elevated);
  min-height: 60px;
}
.phone-row:last-child { border-bottom: none; }
.phone-info { flex: 1; min-width: 0; }
.phone-name { font-weight: 600; font-size: 15px; color: var(--text); }
.phone-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.phone-row .call-btn {
  background: var(--success);
  color: white;
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  text-decoration: none;
}
.phone-row .call-btn.danger { background: var(--danger); }

/* Budget block */
.budget-total {
  background: linear-gradient(135deg, var(--brand), var(--brand-light));
  color: white;
  border-radius: 16px;
  padding: 22px;
  text-align: center;
  margin: 12px 0;
}
.budget-total .lbl { color: var(--gold); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
.budget-total .val { font-size: 38px; font-weight: 800; margin: 4px 0; line-height: 1; color: white; letter-spacing: -1px; }
.budget-total .sub { font-size: 13px; color: rgba(255,255,255,0.85); }

/* Small helpers */
.small { font-size: 12px; }
.muted { color: var(--text-muted); }
.center { text-align: center; }
.mb-0 { margin-bottom: 0 !important; }
.mt-1 { margin-top: 8px; }
.divider { height: 0.5px; background: var(--separator); margin: 8px 0; }

/* Search */
.search-wrap { padding: 8px 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
.search-input {
  width: 100%;
  border: none;
  background: var(--bg-elevated);
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 15px;
  color: var(--text);
  outline: none;
  font-family: inherit;
}
</style>
</head>
<body>

<!-- ============= APP HEADER ============= -->
<div class="app-header" id="app-header">
  <button class="header-back" id="header-back" onclick="goBack()">Info</button>
  <span id="header-title">Islanda 2026</span>
</div>

<!-- ============= APP CONTENT ============= -->
<main class="app-content" id="app-content">

<!-- ============= TAB: HOME (OGGI) ============= -->
<section class="tab-panel active" id="tab-home">
  <div id="home-content"></div>
</section>

<!-- ============= TAB: GIORNI ============= -->
<section class="tab-panel" id="tab-days">
  <div class="section-title large">Itinerario</div>
  <div class="section-subtitle">10 giorni · Ring Road + Snæfellsnes</div>
  <div class="calendar-strip" id="calendar-strip"></div>
  <div id="days-list"></div>
</section>

<!-- ============= TAB: HOTEL ============= -->
<section class="tab-panel" id="tab-hotels">
  <div class="section-title large">Hotel</div>
  <div class="section-subtitle">9 notti · Totale <strong>€2.077,83</strong> · Tutte pagate</div>
  <div id="hotels-list"></div>
</section>

<!-- ============= TAB: INFO ============= -->
<section class="tab-panel" id="tab-info">
  <div id="info-menu">
    <div class="section-title large">Info</div>
    <div class="section-subtitle">Riferimenti utili durante il viaggio</div>

    <div class="list-header">Pratico</div>
    <div class="list-group">
      <button class="list-item" onclick="openInfoPage('voli')"><span class="icon">✈️</span><span class="label">Voli</span><span class="chevron"></span></button>
      <button class="list-item" onclick="openInfoPage('auto')"><span class="icon">🚗</span><span class="label">Auto FairCar</span><span class="chevron"></span></button>
      <button class="list-item" onclick="openInfoPage('guida-auto')"><span class="icon">🛣️</span><span class="label">Guida in Islanda</span><span class="chevron"></span></button>
      <button class="list-item" onclick="openInfoPage('valigia')"><span class="icon">🎒</span><span class="label">Valigia</span><span class="chevron"></span></button>
      <button class="list-item" onclick="openInfoPage('budget')"><span class="icon">💰</span><span class="label">Budget</span><span class="chevron"></span></button>
    </div>

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  document.getElementById('app-content').scrollTop = 0;
  // Reset info page state
  if (tab !== 'info') {
    closeInfoPage();
  } else {
    if (currentInfoPage) showInfoPageInternal(currentInfoPage);
    else updateHeader('Info');
  }
  const titles = { home:'Islanda 2026', days:'Itinerario', hotels:'Hotel', info:'Info', sos:'Emergenza' };
  updateHeader(titles[tab]);
}

function updateHeader(title, showBack) {
  document.getElementById('header-title').textContent = title;
  document.getElementById('header-back').classList.toggle('visible', !!showBack);
}

function goBack() {
  closeInfoPage();
  updateHeader('Info');
}

// ============= DAYS =============
function openDay(n) {
  const cards = document.querySelectorAll('.day-card');
  cards.forEach(c => {
    if (c.dataset.n === String(n)) c.classList.add('open');
    else c.classList.remove('open');
  });
  const target = document.querySelector(`.day-card[data-n="${n}"]`);
  if (target) {
    setTimeout(() => target.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
  }
}

function renderDays() {
  const today = new Date();
  const tripStart = new Date(2026, 6, 15);
  const dayIdx = Math.floor((today - tripStart) / (1000*60*60*24)) + 1;

  // Calendar strip
  let stripHtml = '';
  for (let i = 1; i <= 10; i++) {
    const d = 14 + i;
    let cls = '';
    if (dayIdx > i) cls = 'past';
    if (dayIdx === i) cls = 'today';
    stripHtml += `<button class="cal-day ${cls}" onclick="openDay(${i})"><span class="cal-num">${d}</span></button>`;
  }
  document.getElementById('calendar-strip').innerHTML = stripHtml;

  // Days list
  let html = '';
  DAYS.forEach(day => {
    const isToday = dayIdx === day.n;
    const hotel = day.hotel !== null ? HOTELS[day.hotel] : null;
    const hotelBlock = hotel ? `
      <div class="hotel-card" style="margin-top:12px;">
        <div class="hotel-card-top">
          <div class="hotel-card-num">${hotel.n}</div>
          <div class="hotel-card-title">
            <div class="hotel-card-name">${hotel.name}</div>
            <div class="hotel-card-dates">${hotel.loc} · ${hotel.price}</div>
          </div>
          ${hotel.rating ? `<div class="hotel-card-rating">${hotel.rating}</div>` : ''}
        </div>
        <div class="hotel-card-meta">${hotel.meta}</div>
        <div class="hotel-card-actions">
          <a class="btn btn-map" href="${M(hotel.mapQuery)}">📍 Mappa</a>
          ${hotel.phone ? `<a class="btn btn-success" href="tel:${hotel.phone}">📞 ${hotel.phoneDisplay}</a>` : ''}
          ${hotel.web ? `<a class="btn" href="https://${hotel.web}" target="_blank">🌐 Sito</a>` : ''}
        </div>
      </div>` : '';

    const timeline = day.timeline.map(([t, c]) => `<li><span class="timeline-time">${t}</span><span>${c}</span></li>`).join('');
    const boxes = day.boxes.map(b => `<div class="box ${b.type}"><div class="box-title">${b.title}</div>${b.text}</div>`).join('');

    html += `<div class="day-card ${isToday ? 'today' : ''}" data-n="${day.n}">
      <button class="day-card-summary" onclick="const c=this.parentElement; c.classList.toggle('open');">
        <div class="day-num-badge">${String(day.n).padStart(2,'0')}</div>
        <div class="day-info">
          <div class="day-info-title">${day.title} ${isToday ? '<span class="today-pill" style="margin-left:6px;">Oggi</span>' : ''}</div>
          <div class="day-info-meta">${day.date} · ${day.stats}</div>
        </div>
        <span class="day-chevron">›</span>
      </button>
      <div class="day-card-body">
        ${hotelBlock}
        <h3 style="margin:14px 0 6px 0;">📋 Programma</h3>
        <ul class="timeline">${timeline}</ul>
        ${boxes}
      </div>
    </div>`;
  });
  document.getElementById('days-list').innerHTML = html;

  // Auto-open today's card
  if (dayIdx >= 1 && dayIdx <= 10) {
    setTimeout(() => openDay(dayIdx), 50);
  }
}

function openInfoPage(key) {
  currentInfoPage = key;
  showInfoPageInternal(key);
}

function showInfoPageInternal(key) {
  const page = INFO_PAGES[key];
  if (!page) return;
  document.getElementById('info-menu').style.display = 'none';
  document.getElementById('info-page-container').innerHTML = `<div class="section-title large">${page.title}</div>${page.html}`;
  updateHeader(page.title, true);
  document.getElementById('app-content').scrollTop = 0;
  initChecklists();
}

function closeInfoPage() {
  currentInfoPage = null;
  document.getElementById('info-menu').style.display = '';
  document.getElementById('info-page-container').innerHTML = '';
}

// ============= CHECKLISTS =============
function initChecklists() {
  document.querySelectorAll('.checklist').forEach(list => {
    const key = 'iceland_' + list.dataset.cl;
    let state = {};
    try { state = JSON.parse(localStorage.getItem(key) || '{}'); } catch(e) {}
    list.querySelectorAll('li[data-item]').forEach(li => {
      const cb = li.querySelector('input[type="checkbox"]');
      const id = li.dataset.item;
      if (state[id]) { cb.checked = true; li.classList.add('done'); }
      const handler = (e) => {
        if (e.target.tagName !== 'INPUT') cb.checked = !cb.checked;
        state[id] = cb.checked;
        li.classList.toggle('done', cb.checked);
        try { localStorage.setItem(key, JSON.stringify(state)); } catch(e) {}
      };
      // remove old listeners by cloning
      const clone = li.cloneNode(true);
      li.parentNode.replaceChild(clone, li);
      clone.addEventListener('click', (e) => {
        const cbNew = clone.querySelector('input[type="checkbox"]');
        if (e.target.tagName !== 'INPUT') cbNew.checked = !cbNew.checked;
        state[id] = cbNew.checked;
        clone.classList.toggle('done', cbNew.checked);
        try { localStorage.setItem(key, JSON.stringify(state)); } catch(e) {}
      });
      // Restore checked state after clone
      const cbNew = clone.querySelector('input[type="checkbox"]');
      if (state[id]) { cbNew.checked = true; clone.classList.add('done'); }
    });
  });
}
